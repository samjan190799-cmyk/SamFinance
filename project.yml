name: SamFinance
organizationName: com.samvel
options:
  bundleIdPrefix: com.samvel
  deploymentTarget:
    iOS: "17.0"
targets:
  SamFinance:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        DEVELOPMENT_ASSET_PATHS: '"Resources/Preview Assets.xcassets"'
        PRODUCT_BUNDLE_IDENTIFIER: com.samvel.SamFinance
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
